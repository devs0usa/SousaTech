<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Solicitar Orçamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1 class="logo">Sousa Tech</h1>
</header>

<section class="form">
  <h2>Solicite seu Orçamento</h2>
  <form onsubmit="sendBudgetForm(event)">
    <input type="text" placeholder="Nome" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Empresa (se houver)">
    <textarea placeholder="Conte-nos seu projeto / necessidades"></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

<script>
function sendBudgetForm(e){
  e.preventDefault();
  alert("Formulário enviado! Entraremos em contato em breve.");
}
</script>

</body>
</html>
