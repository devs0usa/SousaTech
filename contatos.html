<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatos</title>

  <!-- Animate.css para animações prontas -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- AOS para animações ao rolar a página -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #0d0d1f;
      color: white;
      padding: 30px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2.5em;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background-color: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    button {
      background-color: #0d0d1f;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    button:hover {
      background-color: #27ae60;
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #0d0d1f;
      color: rgb(255, 255, 255);
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header class="animate__animated animate__fadeInDown">
    <h1>Contatos</h1>
  </header>

  <div class="container">
    <div class="card" data-aos="fade-up">
      <h2>Email</h2>
      <p>sousatech00@gmail.com</p>
      <button onclick="copiarTexto('sousatech00@gmail.com')">Copiar Email</button>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="100">
      <h2>Telefone</h2>
      <p>+55 21 99040-9665</p>
      <button onclick="copiarTexto('+55 21 99040-9665')">Copiar Telefone</button>
    </div>

    <div class="card" data-aos="fade-up" data-aos-delay="200">
      <h2>instagram</h2>
      <p>@sousatech00</p>
      <button onclick="alert('copiado: @sousatech00 !')">copiar perfil</button>
    </div>
  </div>

  <footer class="animate__animated animate__fadeInUp">
    &copy; 2026 Meu Site
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    // Inicializa animações de scroll
    AOS.init({
      duration: 1000,
      once: true
    });

    // Função para copiar texto
    function copiarTexto(texto) {
      navigator.clipboard.writeText(texto)
        .then(() => alert('Copiado: ' + texto))
        .catch(err => alert('Erro ao copiar'));
    }
  </script>

</body>
</html>
